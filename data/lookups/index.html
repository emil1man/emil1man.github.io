<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Характеристики эпох — Sprocket</title>
    <meta name="description" content="Характеристики эпох для Sprocket — рекомендованные веса, удельная мощность, броня и вооружение по трем классам танков одновременно.">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" href="https://fonts.gstatic.com/s/materialicons/v145/flUhRq6tzZclQEJ-Vdg-IuiaDsNcIhQ8tQ.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" as="style" onload="this.rel='stylesheet'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet"></noscript>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons&display=swap" rel="stylesheet">

    <link href="../../assets/css/shared.css" rel="stylesheet">

    <style>
        /* Новые стили для грида карточек */
        #infoCard {
            /* По умолчанию в мобильной версии карточки идут в колонку */
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        /* На экранах шире 900px располагаем карточки в 3 колонки */
        @media (min-width: 900px) {
            #infoCard {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        .tank-class-card {
            background-color: var(--surface-light, #f8f9fa); /* Цвет поверхности из темы */
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background-color 0.3s ease; /* Плавное переключение темы */
        }

        /* Стили для темной темы */
        body.dark-theme .tank-class-card {
            background-color: var(--surface-dark, #202124);
        }

        .card-header {
            font-size: 1.5rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 20px;
            color: var(--on-surface);
        }

        /* Заголовки секций внутри карточек */
        .section-subtitle {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.1rem;
            font-weight: 500;
            margin-top: 15px;
            margin-bottom: 8px;
            color: var(--primary-color);
        }

            .section-subtitle .material-icons {
                font-size: 1.3rem;
            }

        /* Стили для строк данных */
        .data-row {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            font-size: 0.95rem;
        }

        .data-label {
            color: var(--on-surface-variant);
        }

        .data-value {
            font-weight: 500;
            color: var(--on-surface);
        }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="header-inner">
            <h1 class="site-title">Характеристики эпох</h1>

            <div class="nav-container">
                <a href="/" class="btn btn--primary">
                    <span class="icon-chip material-icons" aria-hidden="true">home</span>
                    Главная страница
                </a>
                <a href="/data/lookups/index.html" class="btn btn--tonal">
                    <span class="icon-chip material-icons" aria-hidden="true">analytics</span>
                    Характеристики эпох
                </a>
                <a href="/data/calculator/index.html" class="btn btn--tonal">
                    <span class="icon-chip material-icons" aria-hidden="true">calculate</span>
                    Калькулятор двигателя
                </a>
                <a href="https://store.steampowered.com/app/1674170/Sprocket/" class="btn btn--steam" target="_blank" rel="noopener">
                    <span class="icon-chip"><span class="ico-steam" aria-hidden="true"></span></span>
                    Игра в Steam
                </a>
                <a href="https://www.donationalerts.com/r/emil1man" class="btn btn--primary" target="_blank" rel="noopener">
                    <span class="icon-chip material-icons" aria-hidden="true">favorite</span>
                    Поддержать автора
                </a>
                <button id="themeToggle" class="btn btn--tonal theme-btn-nav">
                    <span class="material-icons" id="themeIcon">dark_mode</span>
                </button>
            </div>
        </div>
    </header>
    <main class="page-container">

        <div class="filters-container">
            <div class="select-group">
                <label for="epochSelect">Эпоха</label>
                <select id="epochSelect" onchange="updateView()"></select>
            </div>
        </div>

        <div id="infoCard" class="info-card">
        </div>

        <div class="note-box">
            <span class="material-icons">info</span>
            <span id="noteText">Загрузка примечания...</span>
        </div>

    </main>

    <script>
        let jsonData = null;
        // Массив классов для перебора в JS
        const tankClasses = ['light', 'medium', 'heavy'];
        const classNames = {
            'light': 'Light (Лёгкий)',
            'medium': 'Medium (Средний)',
            'heavy': 'Heavy (Тяжёлый)'
        };

        // Шаблон карточки класса (теперь без таблиц)
        function createClassCardHTML(cls) {
            return `
                    <div class="tank-class-card" id="card-${cls}">
                        <div class="card-header">${classNames[cls]}</div>

                        <div class="section-subtitle"><span class="material-icons">fitness_center</span> Вес и Мощность</div>
                        <div class="data-row"><span class="data-label">Рекомендуемый вес</span><span class="data-value" id="${cls}-weightVal">-</span></div>
                        <div class="data-row"><span class="data-label">Удельная мощность</span><span class="data-value" id="${cls}-powerVal">-</span></div>

                        <div class="section-subtitle"><span class="material-icons">shield</span> Бронирование корпуса (мм)</div>
                        <div class="data-row"><span class="data-label">Лобовая</span><span class="data-value" id="${cls}-hullFront">-</span></div>
                        <div class="data-row"><span class="data-label">Бортовая</span><span class="data-value" id="${cls}-hullSide">-</span></div>
                        <div class="data-row"><span class="data-label">Кормовая</span><span class="data-value" id="${cls}-hullRear">-</span></div>

                        <div class="section-subtitle"><span class="material-icons">shield</span> Бронирование башни (мм)</div>
                        <div class="data-row"><span class="data-label">Лобовая</span><span class="data-value" id="${cls}-turretFront">-</span></div>
                        <div class="data-row"><span class="data-label">Бортовая</span><span class="data-value" id="${cls}-turretSide">-</span></div>
                        <div class="data-row"><span class="data-label">Кормовая</span><span class="data-value" id="${cls}-turretRear">-</span></div>

                        <div class="section-subtitle"><span class="material-icons">colorize</span> Вооружение</div>
                        <div class="data-row"><span class="data-label">Калибр</span><span class="data-value" id="${cls}-gunCaliber">-</span></div>
                        <div class="data-row"><span class="data-label">Длина каморы</span><span class="data-value" id="${cls}-gunChamber">-</span></div>
                    </div>
                `;
        }

        async function loadData() {
            try {
                // Вставляем 3 шаблона карточек в контейнер сразу
                const infoCardContainer = document.getElementById('infoCard');
                tankClasses.forEach(cls => {
                    infoCardContainer.innerHTML += createClassCardHTML(cls);
                });

                const response = await fetch('basedata.json');
                jsonData = await response.json();

                document.getElementById('noteText').innerText = jsonData.engine_note;

                const epochSelect = document.getElementById('epochSelect');
                jsonData.epochs.forEach(epoch => {
                    const opt = document.createElement('option');
                    opt.value = epoch.id;
                    opt.textContent = epoch.label;
                    epochSelect.appendChild(opt);
                });

                document.getElementById('infoCard').style.display = 'grid'; // Показываем грид
                updateView();
            } catch (e) {
                console.error("Ошибка загрузки:", e);
                document.getElementById('noteText').innerText = "Ошибка загрузки JSON-файла.";
            }
        }

        function updateView() {
            if (!jsonData) return;

            const selectedEpochId = document.getElementById('epochSelect').value;
            const epoch = jsonData.epochs.find(e => e.id === selectedEpochId);
            if (!epoch) return;

            // Проходимся циклом по каждому из трех классов танков
            tankClasses.forEach(cls => {
                const wp = epoch.weight_power[cls];
                const armor = epoch.armor_mm[cls];
                const guns = epoch.guns_mm[cls];

                // Вес и мощность
                document.getElementById(`${cls}-weightVal`).innerText = `${wp.weight_t.min} - ${wp.weight_t.max} т`;
                document.getElementById(`${cls}-powerVal`).innerText = `${wp.power_hp_per_t.min} - ${wp.power_hp_per_t.max} л.с./т`;

                // Броня корпуса
                document.getElementById(`${cls}-hullFront`).innerText = `${armor.hull.front} мм`;
                document.getElementById(`${cls}-hullSide`).innerText = `${armor.hull.side} мм`;
                document.getElementById(`${cls}-hullRear`).innerText = `${armor.hull.rear} мм`;

                // Броня башни
                if (armor.turret) {
                    document.getElementById(`${cls}-turretFront`).innerText = `${armor.turret.front} мм`;
                    document.getElementById(`${cls}-turretSide`).innerText = `${armor.turret.side} мм`;
                    document.getElementById(`${cls}-turretRear`).innerText = `${armor.turret.rear} мм`;
                } else {
                    // Используем классы темы для "Отсутствует" (например, серый цвет)
                    const placeholderHTML = `<span style="color: var(--on-surface-variant); font-style: italic; opacity: 0.7;">Отсутствует</span>`;
                    document.getElementById(`${cls}-turretFront`).innerHTML = placeholderHTML;
                    document.getElementById(`${cls}-turretSide`).innerHTML = placeholderHTML;
                    document.getElementById(`${cls}-turretRear`).innerHTML = placeholderHTML;
                }

                // Вооружение
                document.getElementById(`${cls}-gunCaliber`).innerText = `${guns.caliber.min} - ${guns.caliber.max} мм`;
                document.getElementById(`${cls}-gunChamber`).innerText = `${guns.chamber_length_mm.min} - ${guns.chamber_length_mm.max} мм`;
            });
        }

        window.onload = loadData;
    </script>

    <script src="/assets/css/theme.js"></script>
</body>
</html>
